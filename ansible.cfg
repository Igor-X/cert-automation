[defaults]
# Roles path — find roles relative to the project root
roles_path = ./roles

# Inventory — no default; always pass -i explicitly to target a specific customer
# inventory = inventory/

# Reduce noise for clean output
display_skipped_hosts = false
display_ok_hosts = true

# Retry files clutter the working directory — write to /tmp instead
retry_files_enabled = true
retry_files_save_path = /tmp/ansible-retry

# Log all runs for audit purposes
log_path = /var/log/cert-automation/ansible.log

# Fact caching speeds up monitor runs across many hosts
fact_caching = jsonfile
fact_caching_connection = /tmp/ansible-facts-cache
fact_caching_timeout = 3600

# Don't gather facts by default — playbooks opt in explicitly
gathering = smart

[privilege_escalation]
become = false

[winrm]
# Increase timeout for slow Windows operations (cert import, IIS rebind)
connection_timeout = 60
operation_timeout = 120

[ssh_connection]
pipelining = true
