---
# roles/passwordsafe/tasks/get_credential.yml
#
# Retrieves a credential from PasswordSafe by searching within a project.
# Uses the list endpoint with optional category/username filters, matching
# the pattern from the internal check-item.yml reference implementation.
#
# Requires:
#   - passwordsafe_auth_token          — from get_token
#   - passwordsafe_project_id          — from customer inventory group_vars
#
# One of the following filter variables must be set:
#   - passwordsafe_credential_category — filter by credential category field
#   - passwordsafe_credential_username — filter by credential username field
#   (both can be set to narrow results further)
#
# Registers:
#   - passwordsafe_credential  (dict) — { id, username, password, category, ... }
#
# Usage:
#   - ansible.builtin.include_role:
#       name: passwordsafe
#       tasks_from: get_credential
#     vars:
#       passwordsafe_credential_category: "digicert_api_key"

- name: PasswordSafe | Validate token and project are available
  ansible.builtin.assert:
    that:
      - passwordsafe_auth_token is defined and passwordsafe_auth_token | length > 0
      - passwordsafe_project_id is defined and passwordsafe_project_id | length > 0
    fail_msg: >
      passwordsafe_auth_token and passwordsafe_project_id must be set.
      Run get_token first and ensure passwordsafe_project_id is in group_vars.
    quiet: true

- name: PasswordSafe | Validate at least one search filter is provided
  ansible.builtin.assert:
    that:
      - passwordsafe_credential_category is defined or passwordsafe_credential_username is defined
    fail_msg: >
      At least one of passwordsafe_credential_category or passwordsafe_credential_username
      must be defined to search for a credential.
    quiet: true

- name: "PasswordSafe | List credentials in project {{ passwordsafe_project_id }}"
  ansible.builtin.uri:
    url: "https://passwordsafe.corp.rackspace.com/projects/{{ passwordsafe_project_id }}/credentials?page=1&per_page=200"
    method: GET
    headers:
      Content-Type: "application/json"
      Accept: "application/json"
      X-Auth-Token: "{{ passwordsafe_auth_token }}"
    return_content: true
    status_code: 200
    validate_certs: "{{ passwordsafe_validate_certs }}"
    timeout: "{{ passwordsafe_timeout }}"
  register: _cred_list_response
  no_log: "{{ passwordsafe_no_log }}"

- name: PasswordSafe | Start with full credential list
  ansible.builtin.set_fact:
    _matching_creds: "{{ _cred_list_response.json }}"

- name: PasswordSafe | Filter by category
  ansible.builtin.set_fact:
    _matching_creds: >-
      {{
        _matching_creds
        | selectattr('credential.category', 'equalto', passwordsafe_credential_category)
        | list
      }}
  when: passwordsafe_credential_category is defined and passwordsafe_credential_category | length > 0

- name: PasswordSafe | Filter by username
  ansible.builtin.set_fact:
    _matching_creds: >-
      {{
        _matching_creds
        | selectattr('credential.username', 'equalto', passwordsafe_credential_username)
        | list
      }}
  when: passwordsafe_credential_username is defined and passwordsafe_credential_username | length > 0

- name: PasswordSafe | Assert exactly one credential matched
  ansible.builtin.assert:
    that:
      - _matching_creds | length == 1
    fail_msg: >
      Expected exactly 1 credential match in project {{ passwordsafe_project_id }}
      (category={{ passwordsafe_credential_category | default('unset') }},
       username={{ passwordsafe_credential_username | default('unset') }})
      but found {{ _matching_creds | length }}.
      Check that the category/username values match what is stored in PasswordSafe.

- name: PasswordSafe | Register credential as play fact
  ansible.builtin.set_fact:
    passwordsafe_credential: "{{ _matching_creds[0].credential }}"
  no_log: "{{ passwordsafe_no_log }}"

- name: PasswordSafe | Confirm credential retrieved
  ansible.builtin.debug:
    msg: >
      Credential retrieved from project {{ passwordsafe_project_id }}
      (id: {{ passwordsafe_credential.id }},
       username: {{ passwordsafe_credential.username | default('n/a') }},
       category: {{ passwordsafe_credential.category | default('n/a') }})
