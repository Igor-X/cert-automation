---
# roles/passwordsafe/tasks/update_credential.yml
#
# Updates the password field of an existing credential in PasswordSafe.
# Used by cert_renew to store the newly generated PFX export password after
# each renewal cycle.
#
# Caller must have already run get_credential so that passwordsafe_credential
# is set — we use passwordsafe_credential.id and passwordsafe_credential.project_id
# from the response to build the PATCH URL (matching delete-item.yml pattern).
#
# Required variables:
#   - passwordsafe_auth_token                — from get_token
#   - passwordsafe_credential                — from get_credential (provides id + project_id)
#   - passwordsafe_credential_new_password   — the new password value to store
#
# Usage:
#   - ansible.builtin.include_role:
#       name: passwordsafe
#       tasks_from: get_credential
#     vars:
#       passwordsafe_credential_category: "pfx_export_password"
#
#   - ansible.builtin.include_role:
#       name: passwordsafe
#       tasks_from: update_credential
#     vars:
#       passwordsafe_credential_new_password: "{{ _pfx_password }}"

- name: PasswordSafe | Validate update inputs
  ansible.builtin.assert:
    that:
      - passwordsafe_auth_token is defined and passwordsafe_auth_token | length > 0
      - passwordsafe_credential is defined
      - passwordsafe_credential.id is defined
      - passwordsafe_credential.project_id is defined
      - passwordsafe_credential_new_password is defined and passwordsafe_credential_new_password | length > 0
    fail_msg: >
      passwordsafe_auth_token, passwordsafe_credential (from get_credential), and
      passwordsafe_credential_new_password are all required for update_credential.
    quiet: true

- name: "PasswordSafe | Update credential {{ passwordsafe_credential.id }} in project {{ passwordsafe_credential.project_id }}"
  ansible.builtin.uri:
    url: "https://passwordsafe.corp.rackspace.com/projects/{{ passwordsafe_credential.project_id }}/credentials/{{ passwordsafe_credential.id }}"
    method: PATCH
    headers:
      Content-Type: "application/json"
      Accept: "application/json"
      X-Auth-Token: "{{ passwordsafe_auth_token }}"
    body_format: json
    body:
      credential:
        password: "{{ passwordsafe_credential_new_password }}"
    return_content: true
    status_code: 204
    validate_certs: "{{ passwordsafe_validate_certs }}"
    timeout: "{{ passwordsafe_timeout }}"
  no_log: "{{ passwordsafe_no_log }}"

- name: PasswordSafe | Confirm credential updated
  ansible.builtin.debug:
    msg: >
      Credential {{ passwordsafe_credential.id }} updated in project
      {{ passwordsafe_credential.project_id }}.
