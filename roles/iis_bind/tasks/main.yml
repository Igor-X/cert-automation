---
# roles/iis_bind/tasks/main.yml
#
# Imports a PFX certificate onto a Windows IIS server and updates the HTTPS
# binding on the target site to use the new certificate.
#
# Expected inputs (set by cert_renew or passed directly):
#   iis_pfx_content_b64   — base64-encoded PFX file content
#   iis_pfx_password      — password protecting the PFX (from PasswordSafe)
#   cert_domain           — primary domain on the cert (used for SNI/binding)
#
# Flow:
#   1. Fetch PFX password from PasswordSafe
#   2. Stage the PFX on the remote Windows host
#   3. Import into the Windows cert store
#   4. Rebind the IIS HTTPS binding to the new thumbprint
#   5. Verify the binding is live
#   6. Optionally remove the old certificate
#   7. Clean up the staging file

# --- 1. Fetch PFX password from PasswordSafe ---------------------------------

- name: iis_bind | Fetch PFX password from PasswordSafe
  ansible.builtin.include_role:
    name: passwordsafe
    tasks_from: get_credential
  vars:
    passwordsafe_credential_category: "{{ passwordsafe_pfx_credential_category }}"
  delegate_to: localhost
  run_once: false   # Each host resolves its own copy of the fact

- name: iis_bind | Register PFX password from credential
  ansible.builtin.set_fact:
    _pfx_password: "{{ passwordsafe_credential.password }}"
  no_log: true

# --- 2. Stage PFX on the remote host -----------------------------------------

- name: iis_bind | Ensure staging directory exists
  ansible.windows.win_file:
    path: "{{ iis_cert_staging_path }}"
    state: directory

- name: iis_bind | Write PFX to staging path
  ansible.windows.win_copy:
    content: "{{ iis_pfx_content_b64 | b64decode }}"
    dest: "{{ iis_cert_staging_path }}\\cert_new.pfx"
  no_log: true   # Content is the raw cert material

# --- 3. Import PFX into Windows cert store -----------------------------------

- name: iis_bind | Import PFX into LocalMachine\{{ iis_cert_store }} store
  ansible.windows.win_powershell:
    script: |
      $pfxPath  = "{{ iis_cert_staging_path }}\cert_new.pfx"
      $password = ConvertTo-SecureString "{{ _pfx_password }}" -AsPlainText -Force
      $imported = Import-PfxCertificate `
                    -FilePath $pfxPath `
                    -CertStoreLocation "Cert:\LocalMachine\{{ iis_cert_store }}" `
                    -Password $password `
                    -Exportable

      Write-Output $imported.Thumbprint
    sensitive_parameters:
      - "{{ _pfx_password }}"
  register: _import_result
  no_log: true

- name: iis_bind | Register new cert thumbprint
  ansible.builtin.set_fact:
    _new_thumbprint: "{{ _import_result.output | join('') | trim }}"

- name: iis_bind | Confirm certificate imported
  ansible.builtin.debug:
    msg: "Certificate imported. Thumbprint: {{ _new_thumbprint }}"

# --- 4. Record old thumbprint before rebind (needed for optional cleanup) ----

- name: iis_bind | Get current binding thumbprint before update
  ansible.windows.win_powershell:
    script: |
      $binding = Get-WebBinding -Name "{{ iis_site_name }}" -Protocol "https" -Port {{ iis_https_port }} |
                 Select-Object -First 1
      if ($binding) { Write-Output $binding.certificateHash }
      else { Write-Output "" }
  register: _old_thumbprint_result
  changed_when: false

- name: iis_bind | Register old thumbprint
  ansible.builtin.set_fact:
    _old_thumbprint: "{{ _old_thumbprint_result.output | join('') | trim }}"

# --- 5. Update the IIS HTTPS binding -----------------------------------------

- name: iis_bind | Rebind IIS site to new certificate
  ansible.windows.win_powershell:
    script: |
      Import-Module WebAdministration

      $siteName   = "{{ iis_site_name }}"
      $port       = {{ iis_https_port }}
      $thumbprint = "{{ _new_thumbprint }}"
      $store      = "{{ iis_cert_store }}"
      $sni        = [System.Convert]::ToInt32("{{ iis_binding_require_sni | bool | int }}")

      # Remove existing HTTPS binding on this port
      $existing = Get-WebBinding -Name $siteName -Protocol "https" -Port $port
      if ($existing) {
          Remove-WebBinding -Name $siteName -Protocol "https" -Port $port
      }

      # Create new binding
      New-WebBinding -Name $siteName -Protocol "https" -Port $port -SslFlags $sni

      # Assign certificate to the binding
      $binding = Get-WebBinding -Name $siteName -Protocol "https" -Port $port
      $binding.AddSslCertificate($thumbprint, $store)

      Write-Output "Rebound $siteName :$port to thumbprint $thumbprint"
  register: _rebind_result

- name: iis_bind | Confirm rebind result
  ansible.builtin.debug:
    msg: "{{ _rebind_result.output | join('') }}"

# --- 6. Wait and verify ------------------------------------------------------

- name: iis_bind | Wait for IIS to settle after rebind
  ansible.builtin.pause:
    seconds: "{{ iis_binding_settle_seconds }}"

- name: iis_bind | Verify binding is active and reports correct thumbprint
  ansible.windows.win_powershell:
    script: |
      $binding = Get-WebBinding -Name "{{ iis_site_name }}" -Protocol "https" -Port {{ iis_https_port }} |
                 Select-Object -First 1
      if (-not $binding) {
          Write-Error "No HTTPS binding found on {{ iis_site_name }} port {{ iis_https_port }}"
          exit 1
      }
      if ($binding.certificateHash -ne "{{ _new_thumbprint }}") {
          Write-Error "Thumbprint mismatch. Expected {{ _new_thumbprint }}, got $($binding.certificateHash)"
          exit 1
      }
      Write-Output "Binding verified: $($binding.certificateHash)"
  register: _verify_result
  changed_when: false

- name: iis_bind | Report verification result
  ansible.builtin.debug:
    msg: "{{ _verify_result.output | join('') }}"

# --- 7. Optionally remove the old certificate --------------------------------

- name: iis_bind | Remove old certificate from store
  ansible.windows.win_powershell:
    script: |
      $old = Get-ChildItem "Cert:\LocalMachine\{{ iis_cert_store }}" |
             Where-Object { $_.Thumbprint -eq "{{ _old_thumbprint }}" }
      if ($old) {
          Remove-Item $old.PSPath -Force
          Write-Output "Removed old cert: {{ _old_thumbprint }}"
      } else {
          Write-Output "Old cert not found in store (already removed?): {{ _old_thumbprint }}"
      }
  when:
    - iis_remove_old_cert | bool
    - _old_thumbprint | length > 0
    - _old_thumbprint != _new_thumbprint

# --- 8. Clean up staging file ------------------------------------------------

- name: iis_bind | Remove staged PFX from target host
  ansible.windows.win_file:
    path: "{{ iis_cert_staging_path }}\\cert_new.pfx"
    state: absent
