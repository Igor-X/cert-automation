---
# inventory/customer_a/hosts.yml
# IIS servers for Customer A
#
# Add all IIS nodes for this customer under the iis_servers group.
# The load_balancer group is informational only — used for documentation
# and can be used in future playbooks for drain/restore operations.

all:
  children:

    iis_servers:
      hosts:
        iis-a-01.customer-a.internal:
          ansible_host: 10.10.1.11
        iis-a-02.customer-a.internal:
          ansible_host: 10.10.1.12

    load_balancers:
      hosts:
        lb-a-01.customer-a.internal:
          ansible_host: 10.10.1.1
